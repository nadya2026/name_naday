<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مزيل التكرار | تصدير للاكسل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F0EDE6;
    --surface: #FAFAF8;
    --surface-2: #EEEAE3;
    --border: #D8D4CB;
    --border-light: #E4E0D8;
    --text-primary: #18170F;
    --text-secondary: #6A6760;
    --text-muted: #A09D97;
    --accent-success: #1E5C3A;
    --accent-danger: #8C1F2E;
    --accent-excel: #1D6F42; /* لون الإكسل الأخضر */
    --success-bg: #E3F0E9;
    --danger-bg: #F5E6E9;
    --neutral-bg: #E8E4DC;
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --radius: 12px;
    --radius-lg: 20px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.6;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 72px;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
  }

  .header-icon {
    width: 56px;
    height: 56px;
    background: var(--text-primary);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }

  .header-icon svg {
    width: 26px; height: 26px;
    stroke: #FAFAF8; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
  }

  .header h1 {
    font-size: 24px; font-weight: 600;
    letter-spacing: -0.025em;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 600px;
    overflow: hidden;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .section {
    padding: 28px 30px;
  }

  .section + .section,
  .section + .actions-bar,
  .actions-bar + .section {
    border-top: 1px solid var(--border-light);
  }

  .label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  textarea {
    display: block;
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.85;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    direction: rtl;
    min-height: 160px;
  }

  textarea:focus {
    border-color: var(--text-primary);
    background: var(--surface);
  }

  textarea[readonly] {
    background: var(--surface-2);
    cursor: default;
    resize: none;
  }

  .actions-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding: 16px 30px;
    background: var(--surface-2);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.13s;
    white-space: nowrap;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    appearance: none;
  }

  .btn:hover { background: var(--neutral-bg); border-color: var(--text-muted); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--text-primary);
    color: var(--surface);
    border-color: var(--text-primary);
  }

  .btn-excel {
    background: var(--accent-excel);
    color: white;
    border-color: var(--accent-excel);
  }
  
  .btn-excel:hover {
    background: #155231;
    border-color: #155231;
    color: white;
  }

  .btn svg {
    width: 15px; height: 15px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .stat-box {
    background: var(--surface-2);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 18px 12px;
    text-align: center;
  }

  .stat-num {
    font-size: 30px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-num.ok { color: var(--accent-success); }
  .stat-num.bad { color: var(--accent-danger); }

  .stat-lbl {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    background: var(--success-bg);
    color: var(--accent-success);
    border: 1px solid #b8dfc8;
  }

  #results { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .actions-bar { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="3" width="7.5" height="7.5" rx="1.5"/>
      <rect x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/>
      <rect x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/>
      <path d="M17.25 13.5v7.5M13.5 17.25h7.5"/>
    </svg>
  </div>
  <h1>مزيل التكرار الذكي</h1>
  <p>أدخل الأسماء واحصل على قائمة فريدة مع ميزة التصدير</p>
</header>

<main class="card">
  <div class="section">
    <label class="label">الأسماء المدخلة</label>
    <textarea id="input" placeholder="اكتب أو الصق الأسماء هنا..."></textarea>
    <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">يدعم الأسطر الجديدة أو الفواصل</p>
  </div>

  <div class="actions-bar">
    <button class="btn" onclick="clearAll()">مسح</button>
    <button class="btn btn-primary" onclick="dedupe()">إزالة التكرار</button>
  </div>

  <div id="results">
    <div class="section">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-lbl">الكل</div>
        </div>
        <div class="stat-box">
          <div class="stat-num ok" id="s-unique">0</div>
          <div class="stat-lbl">فريدة</div>
        </div>
        <div class="stat-box">
          <div class="stat-num bad" id="s-removed">0</div>
          <div class="stat-lbl">تكرار</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="result-header">
        <span class="label">القائمة النهائية</span>
        <span class="badge" id="badge">0 اسم</span>
      </div>
      <textarea id="output" readonly></textarea>
    </div>

    <div class="actions-bar">
      <button class="btn" onclick="copyResult()">نسخ النص</button>
      <button class="btn btn-excel" onclick="exportToExcel()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        تصدير Excel (CSV)
      </button>
    </div>
  </div>
</main>

<footer style="margin-top:20px; color:var(--text-muted); font-size:12px;">
  تم التحديث: يدعم تصدير الملفات المتوافقة مع Excel
</footer>

<script>
  let finalNames = [];

  function dedupe() {
    const raw = document.getElementById('input').value.trim();
    if (!raw) return;

    let names = raw.includes(',') ? raw.split(',') : raw.split('\n');
    names = names.map(n => n.trim()).filter(Boolean);

    const total = names.length;
    const seen = new Map();
    names.forEach(n => {
      const k = n.toLowerCase();
      if (!seen.has(k)) seen.set(k, n);
    });

    finalNames = [...seen.values()];
    
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-unique').textContent = finalNames.length;
    document.getElementById('s-removed').textContent = total - finalNames.length;
    document.getElementById('badge').textContent = finalNames.length + ' اسم';
    document.getElementById('output').value = finalNames.join('\n');
    document.getElementById('results').style.display = 'block';
  }

  function exportToExcel() {
    if (finalNames.length === 0) return;

    // إضافة BOM لدعم اللغة العربية في Excel
    const BOM = '\uFEFF';
    const csvContent = BOM + "الأسماء\n" + finalNames.join("\n");
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    
    const date = new Date().toISOString().slice(0,10);
    link.setAttribute("href", url);
    link.setAttribute("download", `قائمة_نظيفة_${date}.csv`);
    link.style.visibility = 'hidden';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function copyResult() {
    const out = document.getElementById('output');
    out.select();
    document.execCommand('copy');
    alert('تم نسخ الأسماء!');
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('results').style.display = 'none';
    finalNames = [];
  }
</script>

</body>
</html>
